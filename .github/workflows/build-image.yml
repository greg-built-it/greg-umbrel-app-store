name: Validate Umbrel app package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML validator dependency
        run: python3 -m pip install --disable-pip-version-check --no-cache-dir PyYAML==6.0.3

      - name: Validate immutable Umbrel package
        run: python3 .github/scripts/validate_package.py
